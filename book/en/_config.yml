title: "Ontological Physics"
author: "Jeroen Douwes"
copyright: "2026"
logo: ""

execute:
  execute_notebooks: force
  timeout: 300

launch_buttons:
  notebook_interface: classic

parse:
  myst_enable_extensions:
    - amsmath
    - dollarmath
    - colon_fence

html:
  use_issues_button: false
  use_repository_button: false
  use_edit_page_button: false
  use_download_button: true
  home_page_in_navbar: true
  extra_footer: |
    <p>&copy; 2026 Jeroen Douwes &middot; <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a> &middot; <a href="mailto:info@ontologicalphysics.com">info@ontologicalphysics.com</a></p>

repository:
  url: https://github.com/jeroendouwes/ontologicalphysics
  branch: main
  path_to_book: book/en

sphinx:
  config:
    mathjax_path: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    html_js_files:
      - https://cdn.plot.ly/plotly-2.35.2.min.js
