  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a0a2e 100%);
      color: #e0e0e0;
    }
    .container {
      text-align: center; padding: 2rem;
    }
    h1 {
      font-size: 2.5rem; margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);

    }
    .subtitle {
      font-size: 1.1rem; color: #94a3b8; margin-bottom: 2.5rem;
    }

    }
    .lang-buttons {
      display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
    }
    .lang-btn {
      display: inline-block; padding: 1rem 2.5rem;
      border: 2px solid #60a5fa; border-radius: 8px;
      color: #e0e0e0; text-decoration: none; font-size: 1.2rem;
      transition: all 0.3s ease;
    }
    .lang-btn:hover {
      background: #60a5fa; color: #0a0a2e;
      transform: translateY(-2px); box-shadow: 0 4px 20px rgba(96,165,250,0.3);
    }
    .redirect-note {
      margin-top: 2rem; font-size: 0.85rem; color: #64748b;
    }
    footer {
      position: fixed; bottom: 1rem; width: 100%; text-align: center;
      font-size: 0.85rem; color: #64748b;
    }
    footer a { color: #60a5fa; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

</head>
